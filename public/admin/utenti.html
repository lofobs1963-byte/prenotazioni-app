<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Gestione Utenti</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<aside class="sidebar">

<h2>Admin</h2>

<nav>
<a href="/admin/dashboard.html">Dashboard</a>
<a href="/admin/utenti.html">Utenti</a>
<a href="/admin/professori.html">Professori</a>
<a href="/admin/slot.html">Slot</a>
<a href="/admin/prenotazioni.html">Prenotazioni</a>
<a href="/admin/calendario.html">Calendario</a>
<a href="/admin/crea-slot.html">Crea Slot</a>
</nav>

<button class="logout" onclick="logout()">Logout</button>

</aside>


<!-- MAIN -->

<main class="main">

<h1>Gestione Utenti</h1>

<p class="subtitle">
Visualizza e gestisci gli utenti registrati
</p>


<div class="form-card">

<h3>Aggiungi Utente</h3>

<div class="form-row">

<input type="text" id="nome" placeholder="Nome utente">

<input type="email" id="email" placeholder="Email">

<select id="ruolo">
<option value="studente">Studente</option>
<option value="professore">Professore</option>
<option value="admin">Admin</option>
</select>

<button class="btn-add" onclick="aggiungiUtente()">
Aggiungi
</button>

</div>

</div>


<div class="form-card">

<h3>Lista Utenti</h3>

<table class="calendar">

<thead>
<tr>
<th>ID</th>
<th>Nome</th>
<th>Email</th>
<th>Ruolo</th>
<th>Azioni</th>
</tr>
</thead>

<tbody id="listaUtenti"></tbody>

</table>

</div>

</main>

</div>


<script src="/js/auth.js"></script>
<script src="/js/admin-utenti.js"></script>

<script>

checkAuth();

function logout(){
localStorage.removeItem("accessToken");
localStorage.removeItem("refreshToken");
window.location="/login.html";
}

</script>

</body>
</html>
