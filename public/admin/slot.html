<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Gestione Slot</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<aside class="sidebar">

<h2>Admin</h2>

<nav>
<a href="/admin/dashboard.html">Dashboard</a>
<a href="/admin/utenti.html">Utenti</a>
<a href="/admin/professori.html">Professori</a>
<a href="/admin/slot.html">Slot</a>
<a href="/admin/prenotazioni.html">Prenotazioni</a>
<a href="/admin/calendario.html">Calendario</a>
<a href="/admin/crea-slot.html">Crea Slot</a>
</nav>

<button class="logout" onclick="logout()">Logout</button>

</aside>


<!-- MAIN -->

<main class="main">

<h1>Gestione Slot</h1>


<div class="form-card">

<h3>Filtri</h3>

<div class="form-grid">

<div class="form-group">
<label>Professore</label>
<select id="filtroProf"></select>
</div>

<div class="form-group">
<label>Giorno</label>
<select id="filtroGiorno">
<option value="">Tutti</option>
<option value="LUN">Lunedì</option>
<option value="MAR">Martedì</option>
<option value="MER">Mercoledì</option>
<option value="GIO">Giovedì</option>
<option value="VEN">Venerdì</option>
</select>
</div>

</div>

<button class="btn-primary" onclick="applicaFiltro()">Filtra</button>

</div>


<div class="form-card">

<table class="calendar" id="tabellaSlot">

<thead>
<tr>
<th>ID</th>
<th>Professore</th>
<th>Giorno</th>
<th>Inizio</th>
<th>Fine</th>
<th>Prenotato</th>
<th>Azione</th>
</tr>
</thead>

<tbody id="listaSlots"></tbody>

</table>

</div>

</main>

</div>


<script src="/js/auth.js"></script>
<script src="/js/admin-slot.js"></script>

<script>

checkAuth();

function logout(){
localStorage.removeItem("accessToken");
localStorage.removeItem("refreshToken");
window.location="/login.html";
}

</script>

</body>
</html>
