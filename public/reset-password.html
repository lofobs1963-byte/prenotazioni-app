<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Reset password</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">
<div class="card">

<h2>Nuova password</h2>

<input type="password" id="password" placeholder="Nuova password">

<input type="password" id="confirm" placeholder="Conferma password">

<button class="btn-primary" onclick="resetPassword()">Salva password</button>

<div id="msg" class="message"></div>

<a class="link" href="/">← Torna al login</a>

</div>
</div>

<script>

const params=new URLSearchParams(window.location.search);
const token=params.get("token");

if(!token){
document.body.innerHTML="Link non valido";
}

async function resetPassword(){

const password=document.getElementById("password").value;
const confirm=document.getElementById("confirm").value;

if(password!==confirm){
document.getElementById("msg").innerText="Le password non coincidono";
return;
}

const res=await fetch("/reset-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
token,
password
})
});

const data=await res.json();

document.getElementById("msg").innerText=data.message || data.error;

if(data.message){
setTimeout(()=>{
window.location="/";
},2000);
}

}

</script>

</body>
</html>
